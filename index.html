<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Sai Kumar & Hemalatha Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Noto+Serif+Telugu:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cinzel', serif;
    background: radial-gradient(circle at center, #6b0000, #2b0000);
    color: gold;
    text-align: center;
    overflow-x: hidden;
}

/* Golden Border Frame */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    border: 18px solid gold;
    pointer-events: none;
    box-shadow: inset 0 0 40px rgba(255,215,0,0.6);
}

/* Ganesha */
.ganesha {
    font-size: 70px;
    margin-top: 40px;
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 15px gold; }
    to { text-shadow: 0 0 35px #ffd700; }
}

/* Entrance */
.fade-in {
    opacity: 0;
    transform: translateY(40px);
    animation: fadeUp 2s forwards;
}

@keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-size: 4em;
    margin-top: 20px;
    text-shadow: 0 0 25px gold;
}

.subheading {
    font-family: 'Noto Serif Telugu', serif;
    font-size: 1.6em;
    margin-top: 25px;
    line-height: 1.8em;
}

.details {
    font-size: 1.3em;
    margin-top: 30px;
    line-height: 2em;
}

.divider {
    width: 250px;
    height: 4px;
    background: gold;
    margin: 35px auto;
    box-shadow: 0 0 20px gold;
}

/* Gallery */
.gallery {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 30px;
    margin: 50px 20px;
}

.gallery img {
    width: 280px;
    height: 340px;
    object-fit: cover;
    border: 6px solid gold;
    border-radius: 20px;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.gallery img:hover {
    transform: scale(1.08);
    box-shadow: 0 0 35px gold;
}

/* Diyas */
.diya {
    position: fixed;
    bottom: 10px;
    font-size: 40px;
    animation: flicker 1.5s infinite alternate;
}

.left-diya { left: 20px; }
.right-diya { right: 20px; }

@keyframes flicker {
    from { text-shadow: 0 0 10px orange; }
    to { text-shadow: 0 0 30px yellow; }
}

/* Jasmine Flowers Falling */
.flower {
    position: fixed;
    top: -10px;
    font-size: 22px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}

footer {
    margin: 60px 0;
    font-size: 1.2em;
    font-family: 'Noto Serif Telugu', serif;
}
</style>
</head>

<body>

<div class="ganesha">🕉️ 🐘</div>

<div class="fade-in">
    <h1>
        Aditya Sai Kumar <br> & <br> Hemalatha
    </h1>

    <div class="divider"></div>

    <div class="subheading">
        శ్రీమతి శ్రీమాన్‌ల ఆశీర్వాదములతో<br>
        మా వివాహ మహోత్సవానికి ఆహ్వానం
    </div>

    <div class="details">
        🗓️ March 7, 2026 <br>
        ⏰ 02:38 AM <br>
        📍 Sri Vasavi Arya Vysya Kalyana Mandapam <br>
        మీ సాన్నిధ్యం మా ఆనందాన్ని మరింత పెంచును
    </div>
</div>

<div class="divider"></div>

<h2>Wedding Moments</h2>

<div class="gallery">
    <img src="bride.jpeg" alt="Bride">
    <img src="groom.jpeg" alt="Groom">
    <img src="couple.jpeg" alt="Couple">
</div>

<footer>
    దివ్య ఆశీస్సులతో మిమ్మల్ని ఆహ్వానిస్తున్నాము 🪔
</footer>

<!-- Diyas -->
<div class="diya left-diya">🪔</div>
<div class="diya right-diya">🪔</div>

<script>
function createFlower() {
    const flower = document.createElement("div");
    flower.classList.add("flower");
    flower.innerHTML = "🌼";
    flower.style.left = Math.random() * 100 + "vw";
    flower.style.animationDuration = (4 + Math.random() * 6) + "s";
    document.body.appendChild(flower);

    setTimeout(() => {
        flower.remove();
    }, 9000);
}
setInterval(createFlower, 400);
</script>

</body>
</html>
