<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #fff;
            color: #333;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }
        h1 {
            color: #800000; /* Burgundy */
            font-size: 3em;
            animation: slide-in 1s ease-in-out;
        }
        .sparkle {
            position: relative;
            display: inline-block;
            color: gold;
            margin: 20px;
            animation: float 3s ease-in-out infinite;
        }
        .floater {
            animation: sparkle 1s forwards;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes sparkle {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .gallery-item {
            display: inline-block;
            width: 200px;
            margin: 10px;
            transition: transform 0.3s;
        }
        .gallery-item:hover {
            transform: scale(1.1);
        }
        .rsvp {
            border: 2px solid burgundy;
            padding: 20px;
            margin-top: 30px;
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .flower {
            position: absolute;
            top: -10;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <h1>You're Invited!</h1>
    <div class="sparkle">✨✨✨</div>
    <p>You are cordially invited to the wedding of <strong>Aditya Sai Kumar</strong> and <strong>Hemalatha</strong></p>
    <p><strong>Event Details:</strong></p>
    <p>🗓️ Saturday, March 7, 2026<br>
       ⏰ 02:38 AM<br>
       📍 Sri Vasavi Arya Vysya Kalyana Mandapadam</p>
    <div class="rsvp">
        <h2>RSVP</h2>
        <form>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name"><br><br>
            <label for="attending">Will you attend?</label><br>
            <select id="attending" name="attending">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select><br><br>
            <input type="submit" value="Submit">
        </form>
    </div>
    <footer>
        <p>Join us for a day filled with love, laughter, and joy!</p>
    </footer>
</body>
</html>
