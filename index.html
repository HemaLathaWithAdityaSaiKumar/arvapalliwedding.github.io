<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1, h2, h3 {
            text-align: center;
            color: #9C0000;
        }
        .date, .venue {
            font-size: 1.2em;
            text-align: center;
            margin: 10px 0;
        }
        .gallery, .rsvp {
            margin: 20px 0;
        }
        .rsvp-form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .rsvp-form input, .rsvp-form button {
            margin: 5px;
            padding: 10px;
            width: 80%;
        }
        .btn {
            background-color: #FFD700;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Join Us for Our Wedding Celebration!</h1>
        <h2>Aditya Sai Kumar & Hemalatha</h2>
        <div class="date">Saturday, March 7, 2026 at 02:38 AM</div>
        <div class="venue">Venue: Sri Vasavi Arya Vysya Kalyana Mandapadam</div>
        <h3>Photo Gallery</h3>
        <div class="gallery">
            <!-- You can add image elements here -->
            <img src="path/to/photo1.jpg" alt="Gallery Photo 1" style="width:100%; max-height:300px; object-fit:cover; border-radius:10px;"/>
            <img src="path/to/photo2.jpg" alt="Gallery Photo 2" style="width:100%; max-height:300px; object-fit:cover; border-radius:10px;"/>
            <img src="path/to/photo3.jpg" alt="Gallery Photo 3" style="width:100%; max-height:300px; object-fit:cover; border-radius:10px;"/>
        </div>
        <h3>RSVP</h3>
        <div class="rsvp">
            <form class="rsvp-form">
                <input type="text" placeholder="Your Name" required />
                <input type="email" placeholder="Your Email" required />
                <button class="btn" type="submit">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
