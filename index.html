<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arvapalli’s Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400&family=Noto+Serif+Telugu:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ENTRY SCREEN -->
<div id="entry-screen">
  <div class="entry-content">
    <h2>Welcome</h2>
    <button id="enter-btn">Arvapalli's Marriage Invitation</button>
  </div>
</div>

<audio id="bg-music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">

    <div class="ganesha-wrapper">
      <img src="ganesh.webp" alt="Lord Ganesha">
    </div>

    <h1 class="main-names">
      Hemalatha <span>&</span> Aditya Sai Kumar
    </h1>

    <p class="telugu">
      శ్రీరస్తు శుభమస్తు అవిఘ్నమస్తు<br><br>
      మా ప్రియమైన కుమార్తె వివాహ మహోత్సవమునకు<br>
      మీరు విచ్చేసి వధూవరులను ఆశీర్వదించవలసిందిగా మనవి.
    </p>

  </div>
</section>

<script src="script.js"></script>
</body>
</html>
