<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Sai Kumar & Hemalatha Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+Telugu:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cinzel', serif;
    background: radial-gradient(circle at center, #5a0000, #2b0000);
    color: gold;
    text-align: center;
    overflow-x: hidden;
}

/* Decorative Border */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    border: 15px solid gold;
    pointer-events: none;
}

/* Entrance Animation */
.fade-in {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 2s forwards;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h1 {
    font-size: 3.8em;
    margin-top: 60px;
    text-shadow: 0 0 20px gold;
}

.subheading {
    font-family: 'Noto Serif Telugu', serif;
    font-size: 1.6em;
    margin-top: 20px;
}

.details {
    font-size: 1.3em;
    margin-top: 30px;
    line-height: 1.8em;
}

/* Gold Divider */
.divider {
    width: 200px;
    height: 3px;
    background: gold;
    margin: 30px auto;
    box-shadow: 0 0 15px gold;
}

/* Gallery */
.gallery {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 25px;
    margin: 40px 20px;
}

.gallery img {
    width: 260px;
    height: 320px;
    object-fit: cover;
    border: 5px solid gold;
    border-radius: 15px;
    transition: transform 0.4s, box-shadow 0.4s;
}

.gallery img:hover {
    transform: scale(1.1);
    box-shadow: 0 0 30px gold;
}

/* Jasmine Flowers Falling */
.flower {
    position: fixed;
    top: -10px;
    font-size: 22px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}

footer {
    margin: 50px 0;
    font-size: 1.2em;
}
</style>
</head>

<body>

<div class="fade-in">
    <h1>Aditya Sai Kumar <br> & <br> Hemalatha</h1>
    <div class="divider"></div>

    <div class="subheading">
        శ్రీమతి శ్రీమాన్‌ల ఆశీర్వాదములతో<br>
        మా వివాహ మహోత్సవానికి ఆహ్వానం
    </div>

    <div class="details">
        🗓️ March 7, 2026 <br>
        ⏰ 02:38 AM <br>
        📍 Sri Vasavi Arya Vysya Kalyana Mandapam <br>
        మీ సాన్నిధ్యం మా ఆనందాన్ని మరింత పెంచును
    </div>
</div>

<div class="divider"></div>

<h2>Our Sacred Moments</h2>

<div class="gallery">
    <img src="image1.jpg" alt="Couple Photo 1">
    <img src="image2.jpg" alt="Couple Photo 2">
    <img src="image3.jpg" alt="Couple Photo 3">
</div>

<footer>
    With Divine Blessings & Love 🪔
</footer>

<script>
function createFlower() {
    const flower = document.createElement("div");
    flower.classList.add("flower");
    flower.innerHTML = "🌼";
    flower.style.left = Math.random() * 100 + "vw";
    flower.style.animationDuration = (4 + Math.random() * 6) + "s";
    document.body.appendChild(flower);

    setTimeout(() => {
        flower.remove();
    }, 9000);
}
setInterval(createFlower, 400);
</script>

</body>
</html>
