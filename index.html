<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya & Hemalatha Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: linear-gradient(135deg, #fff5f5, #fdebd3);
    color: #4a2c2a;
    text-align: center;
    overflow-x: hidden;
    animation: fadeIn 2s ease-in;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 4em;
    color: #800000;
    margin-top: 60px;
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #b22222; }
    to { text-shadow: 0 0 25px #ffb6b9; }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.section {
    padding: 60px 20px;
    animation: slideUp 1.5s ease forwards;
}

@keyframes slideUp {
    from { transform: translateY(50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.details {
    font-size: 1.3em;
    margin-top: 20px;
}

.countdown {
    font-size: 1.5em;
    margin-top: 20px;
    color: #b22222;
}

.rsvp {
    background: rgba(255,255,255,0.9);
    padding: 30px;
    max-width: 400px;
    margin: 40px auto;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

input, select {
    width: 80%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #800000;
    color: white;
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #b22222;
    transform: scale(1.05);
}

/* Floating petals */
.petal {
    position: fixed;
    top: -10px;
    font-size: 20px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="section">
    <h1>Aditya Sai Kumar & Hemalatha</h1>
    <p class="details">
        We joyfully invite you to our wedding celebration
        <br><br>
        🗓️ March 7, 2026<br>
        ⏰ 02:38 AM<br>
        📍 Sri Vasavi Arya Vysya Kalyana Mandapadam
    </p>

    <div class="countdown" id="countdown"></div>
</div>

<div class="rsvp">
    <h2>RSVP</h2>
    <input type="text" placeholder="Your Name">
    <select>
        <option>Will you attend?</option>
        <option>Yes</option>
        <option>No</option>
    </select>
    <br>
    <button onclick="celebrate()">Submit</button>
</div>

<footer class="section">
    Join us for a day filled with love, laughter & blessings ❤️
</footer>

<script>
// Countdown Timer
var weddingDate = new Date("March 7, 2026 02:38:00").getTime();
var x = setInterval(function() {
  var now = new Date().getTime();
  var distance = weddingDate - now;

  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  document.getElementById("countdown").innerHTML =
  "⏳ " + days + " days to go!";
}, 1000);

// Petals animation
function createPetal() {
    const petal = document.createElement("div");
    petal.classList.add("petal");
    petal.innerHTML = "🌸";
    petal.style.left = Math.random() * 100 + "vw";
    petal.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(petal);

    setTimeout(() => {
        petal.remove();
    }, 8000);
}
setInterval(createPetal, 300);

// Celebration effect
function celebrate() {
    alert("Thank you! We can't wait to celebrate with you 💖");
}
</script>

</body>
</html>
